baseURL = 'https://blog.codebar.io'
languageCode = 'en-US'
title = 'codebar Blog'
theme = 'codebar-simple'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 30

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'

[params]
  author = 'codebar'
  description = 'A blog about codebar, diversity in tech, and our community'

# Enable raw HTML in markdown content
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
