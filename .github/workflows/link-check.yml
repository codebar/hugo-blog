name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  link-checker:
    name: Link Checker
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Required for creating issues from file
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install lychee
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/download/nightly/lychee-nightly-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv lychee /usr/local/bin/

      - name: Link Checker
        id: lychee
        run: |
          mkdir -p lychee
          make check-links --output-sync=recurse 2>&1 | tee lychee/out.md || true
          # Set exit code based on lychee output
          if grep -q "Errors found" lychee/out.md 2>/dev/null || grep -q "\[ERROR\]" lychee/out.md 2>/dev/null; then
            echo "exit_code=1" >> $GITHUB_OUTPUT
          else
            echo "exit_code=0" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code == '1'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
