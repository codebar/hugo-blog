<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}" dir="{{ site.Language.Direction | default "ltr" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  {{ partial "header.html" . }}
  
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  
  {{ partial "footer.html" . }}
</body>
</html>
