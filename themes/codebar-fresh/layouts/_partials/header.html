<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-logo" aria-label="{{ site.Title }} - Home">
      <img src="{{ "logo.png" | relURL }}" alt="{{ site.Title }}" width="148" height="40">
    </a>
    
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {{ range site.Menus.main }}
        <li>
          <a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
